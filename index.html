<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <h1>🗳️ Election Assistant</h1>
    <p>Smart guide for voters 🇮🇳</p>
  </header>

  <div id="chatContainer" class="chat"></div>

  <div class="quick">
    <button onclick="quick('start')">Start</button>
    <button onclick="quick('timeline')">Timeline</button>
    <button onclick="findBooth()">Booth</button>
    <button onclick="showAnalytics()">Analytics</button>
    <button onclick="startVoice()">🎙</button>
  </div>

  <div class="inputBox">
    <input id="userInput" placeholder="Ask something..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
