<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Election Guide Pro</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Maps (Replace YOUR_API_KEY) -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg,#0077b6,#023e8a);
}

/* Dashboard */
.dashboard {
  padding: 20px;
}

canvas {
  max-width: 400px;
  margin: 20px auto;
  display: block;
}

/* Map */
#map {
  height: 400px;
  border-radius: 10px;
}

/* Chatbot */
#chatbot-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00b4d8;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

#chatbot-box {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 300px;
  height: 400px;
  background: #111;
  display: none;
  flex-direction: column;
}

.chat-header {
  background: #0077b6;
  padding: 10px;
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.chat-input {
  display: flex;
}

.chat-input input {
  flex: 1;
  padding: 10px;
}

.chat-input button {
  background: #00b4d8;
  border: none;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🇮🇳 India Election Guide Pro 2024</h1>
</div>

<div class="dashboard">

<h2>📊 Election Results</h2>
<canvas id="resultsChart"></canvas>

<h2>🗺️ Polling Map</h2>
<div id="map"></div>

</div>

<!-- Chatbot -->
<div id="chatbot-toggle" onclick="toggleChatbot()">💬</div>

<div id="chatbot-box">
  <div class="chat-header">
    Election Bot <span onclick="toggleChatbot()" style="float:right;cursor:pointer;">✖</span>
  </div>
  <div id="chat-messages"></div>
  <div class="chat-input">
    <input id="user-input" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

/* ================= CHART ================= */
new Chart(document.getElementById('resultsChart'), {
  type: 'doughnut',
  data: {
    labels: ['NDA', 'INDIA', 'Others'],
    datasets: [{
      data: [293,234,16],
      backgroundColor: ['orange','blue','green']
    }]
  }
});

/* ================= MAP ================= */
function initMap() {
  const center = { lat: 19.8762, lng: 75.3433 };

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 10,
    center: center
  });

  const locations = [
    { lat: 19.8762, lng: 75.3433 },
    { lat: 19.90, lng: 75.35 }
  ];

  locations.forEach(loc => {
    new google.maps.Marker({
      position: loc,
      map: map
    });
  });
}

/* ================= CHATBOT ================= */
function toggleChatbot() {
  const box = document.getElementById("chatbot-box");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function sendMessage() {
  const input = document.getElementById("user-input");
  const text = input.value;

  addMsg("You", text);

  const reply = botReply(text.toLowerCase());
  setTimeout(() => addMsg("Bot", reply), 500);

  input.value = "";
}

function addMsg(sender, msg) {
  const div = document.createElement("div");
  div.innerHTML = "<b>" + sender + ":</b> " + msg;
  document.getElementById("chat-messages").appendChild(div);
}

function botReply(msg) {
  if (msg.includes("vote")) return "Go to booth → Verify ID → Vote on EVM.";
  if (msg.includes("evm")) return "Use EVM machine to vote electronically.";
  if (msg.includes("result")) return "NDA:293 INDIA:234 Others:16";
  if (msg.includes("map")) return "Scroll to map above.";
  return "Ask about voting, results, or EVM.";
}

</script>

</body>
</html>
